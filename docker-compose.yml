version: '3.8'

services:
  slims:
    image: php:8.1-apache
    container_name: slims_app
    volumes:
      - ./slims:/var/www/html
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    ports:
      - "8080:80"
    depends_on:
      - db
    restart: always

  db:
    image: mariadb:10.3
    container_name: slims_db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: slims_root_password
      MYSQL_DATABASE: slims
      MYSQL_USER: slims_user
      MYSQL_PASSWORD: slims_password
    ports:
      - "3306:3306"
    restart: always

volumes:
  db_data:
